name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy manually'
        required: true
        type: choice
        options:
          - qa
          - dev

env:
  PROJECT_ID: dmx-case42
  REGION: europe-west3
  IMAGE_REGISTRY: europe-west3-docker.pkg.dev/dmx-case42/image-service/image-service

jobs:
  # ---------------------------------------------------------------------------
  # Build: live  →  Image einmal bauen, dann auf 3 Services deployen
  # ---------------------------------------------------------------------------
  build-live:
    name: Build (live)
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/734680744363/locations/global/workloadIdentityPools/github-pool/providers/github-pool
          service_account: github-ksta-medien@dmx-case42.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_REGISTRY }}:${{ github.sha }} \
            -t ${{ env.IMAGE_REGISTRY }}:live-latest \
            .
          docker push ${{ env.IMAGE_REGISTRY }}:${{ github.sha }}
          docker push ${{ env.IMAGE_REGISTRY }}:live-latest

  # ---------------------------------------------------------------------------
  # Deploy: live  →  3 Cloud Run Services (Matrix)
  # ---------------------------------------------------------------------------
  deploy-live:
    name: Deploy ${{ matrix.service }} (live)
    runs-on: ubuntu-latest
    needs: build-live

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ksta-image-service-live
            GCS_BUCKET_NAME: livingdocs-image-live
            GCS_BUCKET_BASE_URL: https://storage.cloud.google.com/livingdocs-image-live
          - service: kr-image-service-live
            GCS_BUCKET_NAME: livingdocs-image-live
            GCS_BUCKET_BASE_URL: https://storage.cloud.google.com/livingdocs-image-live
          - service: exp-image-service-live  
            GCS_BUCKET_NAME: livingdocs-image-live
            GCS_BUCKET_BASE_URL: https://storage.cloud.google.com/livingdocs-image-live

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/734680744363/locations/global/workloadIdentityPools/github-pool/providers/github-pool
          service_account: github-ksta-medien@dmx-case42.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ matrix.service }} \
            --image ${{ env.IMAGE_REGISTRY }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars="GCS_BUCKET_NAME=${{ matrix.GCS_BUCKET_NAME }},GCS_BUCKET_BASE_URL=${{ matrix.GCS_BUCKET_BASE_URL }}"

      - name: Get service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "[live] ${{ matrix.service }} deployed to: $SERVICE_URL"

  # ---------------------------------------------------------------------------
  # Build: qa  →  Image einmal bauen, dann auf 3 Services deployen
  # ---------------------------------------------------------------------------
  build-qa:
    name: Build (qa)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'qa')

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/734680744363/locations/global/workloadIdentityPools/github-pool/providers/github-pool
          service_account: github-ksta-medien@dmx-case42.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_REGISTRY }}:${{ github.sha }} \
            -t ${{ env.IMAGE_REGISTRY }}:qa-latest \
            .
          docker push ${{ env.IMAGE_REGISTRY }}:${{ github.sha }}
          docker push ${{ env.IMAGE_REGISTRY }}:qa-latest

  # ---------------------------------------------------------------------------
  # Deploy: qa  →  3 Cloud Run Services (Matrix)
  # ---------------------------------------------------------------------------
  deploy-qa:
    name: Deploy ${{ matrix.service }} (qa)
    runs-on: ubuntu-latest
    needs: build-qa

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ksta-image-service-qa
            GCS_BUCKET_NAME: livingdocs-image-qa
            GCS_BUCKET_BASE_URL: https://storage.cloud.google.com/livingdocs-image-qa
          - service: kr-image-service-qa
            GCS_BUCKET_NAME: livingdocs-image-qa
            GCS_BUCKET_BASE_URL: https://storage.cloud.google.com/livingdocs-image-qa
          - service: exp-image-service-qa  # Cloud Run erlaubt keine Unterstriche
            GCS_BUCKET_NAME: livingdocs-image-qa
            GCS_BUCKET_BASE_URL: https://storage.cloud.google.com/livingdocs-image-qa

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/734680744363/locations/global/workloadIdentityPools/github-pool/providers/github-pool
          service_account: github-ksta-medien@dmx-case42.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ matrix.service }} \
            --image ${{ env.IMAGE_REGISTRY }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars="GCS_BUCKET_NAME=${{ matrix.GCS_BUCKET_NAME }},GCS_BUCKET_BASE_URL=${{ matrix.GCS_BUCKET_BASE_URL }}"

      - name: Get service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "[qa] ${{ matrix.service }} deployed to: $SERVICE_URL"

  # ---------------------------------------------------------------------------
  # Deploy: Dev  →  1 Cloud Run Service
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy image-service-dev (dev)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')

    env:
      SERVICE_NAME: image-service-dev
      GCS_BUCKET_NAME: livingdocs-image-dev
      GCS_BUCKET_BASE_URL: https://storage.cloud.google.com/livingdocs-image-dev

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/734680744363/locations/global/workloadIdentityPools/github-pool/providers/github-pool
          service_account: github-ksta-medien@dmx-case42.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_REGISTRY }}:${{ github.sha }} \
            -t ${{ env.IMAGE_REGISTRY }}:dev-latest \
            .
          docker push ${{ env.IMAGE_REGISTRY }}:${{ github.sha }}
          docker push ${{ env.IMAGE_REGISTRY }}:dev-latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_REGISTRY }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars="GCS_BUCKET_NAME=${{ env.GCS_BUCKET_NAME }},GCS_BUCKET_BASE_URL=${{ env.GCS_BUCKET_BASE_URL }}"

      - name: Get service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          echo "[dev] ${{ env.SERVICE_NAME }} deployed to: $SERVICE_URL"
